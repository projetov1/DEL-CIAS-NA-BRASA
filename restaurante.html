  return <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ${c.bg} ${c.tx}`}>
    <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}/>
    {c.label}
  </span>;
}

/* ─── KPI CARD ─── */
function KpiCard({IC,label,value,sub,grad}){
  return <div className="bg-white rounded-2xl shadow-sm p-5 flex items-center gap-4 border border-white">
    <div className={`w-14 h-14 rounded-xl ${grad} flex items-center justify-center shadow-md shrink-0`}>
      <IC className="w-7 h-7 text-white"/>
    </div>
    <div className="min-w-0">
      <p className="text-xs text-slate-400 font-medium uppercase tracking-wide">{label}</p>
      <p className="text-2xl font-bold text-slate-800">{value}</p>
      {sub&&<p className="text-xs text-slate-400 mt-0.5">{sub}</p>}
    </div>
  </div>;
}

/* ─── CARD DE PEDIDO ─── */
function PedidoCard({p,onStatus}){
  const prox={aguardando:'preparo',preparo:'pronto',pronto:'entregue'};
  const btnLbl={aguardando:'Iniciar preparo',preparo:'Marcar pronto',pronto:'Entregar'};
  const btnCl={aguardando:'bg-blue-500 hover:bg-blue-600',preparo:'bg-emerald-500 hover:bg-emerald-600',pronto:'bg-slate-600 hover:bg-slate-700'};
  return <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex flex-col gap-3">
    <div className="flex items-start justify-between gap-2">
      <div>
        <p className="font-semibold text-slate-800 text-sm">{p.cliente}</p>
        <p className="text-xs text-slate-400 mt-0.5">
          <span className="font-mono">#{String(p.id).padStart(4,'0')}</span> · {p.hora}
          {p.entrega&&<span className="ml-1">· {p.entrega}{p.bairro?` (${p.bairro})`:''}</span>}
        </p>
      </div>
      <Badge status={p.status}/>
    </div>
    <ul className="space-y-1">
      {p.itens.map((it,i)=><li key={i} className="text-sm text-slate-600 flex items-center gap-2">
        <span className="w-1 h-1 rounded-full bg-orange-400 shrink-0"/>
        {it}
      </li>)}
    </ul>
    <div className="flex items-center justify-between pt-2 border-t border-slate-50">
      <div>
        <span className="font-bold text-orange-600 text-base">{fmt(p.total)}</span>
        {p.pgto&&<span className="ml-2 text-xs text-slate-400">{p.pgto}</span>}
      </div>
      {prox[p.status]&&<button onClick={()=>onStatus(p.id,prox[p.status])}
        className={`flex items-center gap-1.5 text-xs text-white px-3 py-1.5 rounded-lg transition font-medium ${btnCl[p.status]}`}>
        {btnLbl[p.status]}<Ic.Arr className="w-3.5 h-3.5"/>
      </button>}
    </div>
  </div>;
}

/* ─── DASHBOARD ─── */
function Dashboard({pedidos,onStatus}){
  const ativos   =pedidos.filter(p=>p.status!=='entregue');
  const entregues=pedidos.filter(p=>p.status==='entregue');
  const total    =pedidos.reduce((s,p)=>s+p.total,0);
  const pizzas   =pedidos.filter(p=>p.tipo==='pizza').length;
  const churras  =pedidos.filter(p=>p.tipo==='churrasco').length;
  const upd=(id,st)=>onStatus(id,st);
  return <div className="space-y-6">
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <KpiCard IC={Ic.Money} label="Faturamento Hoje" value={fmt(total)}      sub="todos os pedidos"       grad="bg-gradient-to-br from-emerald-400 to-emerald-600"/>
      <KpiCard IC={Ic.Clip}  label="Pedidos Ativos"   value={ativos.length}   sub={`${entregues.length} entregues`} grad="bg-gradient-to-br from-orange-400 to-orange-600"/>
      <KpiCard IC={Ic.Pizza} label="Pizzas Hoje"      value={pizzas}          sub="pedidos com pizza"      grad="bg-gradient-to-br from-red-400 to-red-600"/>
      <KpiCard IC={Ic.Grill} label="Churrascos Hoje"  value={churras}         sub="pedidos com churrasco"  grad="bg-gradient-to-br from-amber-400 to-amber-600"/>
    </div>
    <section>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-base font-bold text-slate-700">Pedidos em Andamento</h2>
        <span className="text-xs bg-orange-100 text-orange-700 font-semibold px-2.5 py-1 rounded-full">{ativos.length} ativos</span>
      </div>
      {ativos.length===0
        ?<div className="bg-white rounded-2xl border border-dashed border-slate-200 py-12 text-center text-slate-400 text-sm">Nenhum pedido ativo no momento.</div>
        :<div className="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">{ativos.map(p=><PedidoCard key={p.id} p={p} onStatus={upd}/>)}</div>}
    </section>
    {entregues.length>0&&<section>
      <h2 className="text-base font-bold text-slate-700 mb-4">Entregues Hoje</h2>
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 divide-y divide-slate-50">
        {entregues.map(p=><div key={p.id} className="flex items-center justify-between px-5 py-3 gap-4">
          <div className="min-w-0">
            <p className="font-medium text-slate-700 text-sm truncate">{p.cliente}</p>
            <p className="text-xs text-slate-400 truncate">{p.itens.join(', ')}</p>
          </div>
          <div className="text-right shrink-0">
            <p className="font-semibold text-slate-700 text-sm">{fmt(p.total)}</p>
            <Badge status="entregue"/>
          </div>
        </div>)}
      </div>
    </section>}
  </div>;
}

/* ─── CARDÁPIO ─── */
function Cardapio(){
  const [cat,setCat]=useState('churrasco');
  const cats=[
    {k:'churrasco',l:'Churrascos',   ic:'🥩'},
    {k:'aves',     l:'Aves',         ic:'🍗'},
    {k:'file',     l:'Filé',         ic:'🍽️'},
    {k:'entradas', l:'Entradas',     ic:'🥗'},
    {k:'almoco1',  l:'Almoços (1p)', ic:'🍱'},
    {k:'almoco2',  l:'Almoços (2p)', ic:'🍱'},
    {k:'petiscos', l:'Petiscos',     ic:'🍟'},
    {k:'pizzag',   l:'Pizza Grande', ic:'🍕'},
    {k:'pizzam',   l:'Pizza Média',  ic:'🍕'},
  ];
  const cor = k=>{
    if(k.startsWith('pizza')) return 'border-red-200 bg-red-50';
    if(k==='aves'||k==='entradas') return 'border-amber-200 bg-amber-50';
    if(k==='petiscos') return 'border-yellow-200 bg-yellow-50';
    if(k.startsWith('almoco')) return 'border-green-200 bg-green-50';
    return 'border-orange-200 bg-orange-50';
  };
  return <div className="space-y-5">
    <div className="flex flex-wrap gap-2">
      {cats.map(({k,l,ic})=><button key={k} onClick={()=>setCat(k)}
        className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium transition-all border ${cat===k?'bg-orange-500 text-white border-orange-500 shadow':'bg-white text-slate-500 border-slate-200 hover:border-orange-300 hover:text-orange-500'}`}>
        <span>{ic}</span>{l}
      </button>)}
    </div>
    <div className="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">
      {CARDAPIO[cat].map(it=><div key={it.id} className={`bg-white rounded-2xl border shadow-sm p-4 flex gap-3 items-center hover:shadow-md transition-shadow ${cor(cat)}`}>
        <div className={`w-12 h-12 rounded-xl border flex items-center justify-center text-2xl shrink-0 ${cor(cat)}`}>{it.ic}</div>
        <div className="min-w-0">
          <p className="font-semibold text-slate-800 text-sm">{it.nome}</p>
          <p className="text-xs text-slate-400 mt-0.5 leading-snug">{it.desc}</p>
          <p className="text-orange-600 font-bold mt-1.5">{fmt(it.preco)}</p>
        </div>
      </div>)}
    </div>
  </div>;
}

/* ══════════════════════════════════════════════
   CHATBOT  —  Fluxo completo estilo WhatsApp
   useRef para o pedido = sem stale closure
══════════════════════════════════════════════ */
function ChatBot({onNovoPedido}){
  const [open,setOpen]           = useState(false);
  const [msgs,setMsgs]           = useState([]);
  const [opcoes,setOpcoes]       = useState([]);        // botões ativos
  const [inputMode,setInputMode] = useState(null);      // {hint, resolve}
  const [inputVal,setInputVal]   = useState('');
  const pedidoRef                = useRef({nome:'',entrega:'',bairro:null,endereco:'',carrinho:[],pgto:'',troco:''});
  const endRef                   = useRef(null);
  const resolveRef               = useRef(null);        // guarda o resolve do input

  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs,opcoes]);

  /* helpers */
  const bot = useCallback((txt,ops=[])=>{
    setMsgs(p=>[...p,{id:Date.now()+Math.random(),de:'bot',txt}]);
    setOpcoes(ops);
  },[]);
  const user = useCallback((txt)=>{
    setMsgs(p=>[...p,{id:Date.now()+Math.random(),de:'user',txt}]);
    setOpcoes([]);
  },[]);

  /* Pede texto livre, retorna Promise */
  const askInput = useCallback((hint)=>new Promise(res=>{
    resolveRef.current = res;
    setInputMode(hint);
    setOpcoes([]);
  }),[]);

  const submitInput = useCallback(()=>{
    const v = inputVal.trim();
    if(!v||!resolveRef.current) return;
    setInputVal('');
    setInputMode(null);
    resolveRef.current(v);
    resolveRef.current = null;
  },[inputVal]);

  /* delay util */
  const delay = ms=>new Promise(r=>setTimeout(r,ms));

  /* ══ FLUXO PRINCIPAL ══ */
  const iniciar = useCallback(async()=>{
    const p = pedidoRef.current;
    p.nome=''; p.entrega=''; p.bairro=null; p.endereco=''; p.carrinho=[]; p.pgto=''; p.troco='';

    await delay(200);
    bot(
      'Olá! 👋 Seja muito bem-vindo(a) à\n*Delícias na Brasa!* 🔥🍕\n\nComo posso te ajudar hoje?',
      [
        {l:'🛒 Fazer um pedido',         fn:()=>fluxoPedido()},
        {l:'📋 Ver cardápio completo',   fn:()=>verCardapio()},
        {l:'🕐 Horário de funcionamento',fn:()=>verHorario()},
        {l:'📍 Endereço / Localização',  fn:()=>verEndereco()},
      ]
    );
  },[]);

  /* ── INFO ── */
  const verCardapio = useCallback(async()=>{
    user('📋 Ver cardápio completo');
    await delay(300);
    const linhas = cat => CARDAPIO[cat].map(i=>`${i.ic} *${i.nome}* — ${fmt(i.preco)}`).join('\n');
    bot(`*📋 Cardápio Completo*\n\n*🥩 CHURRASCOS*\n${linhas('churrasco')}\n\n*🍗 AVES*\n${linhas('aves')}\n\n*🍽️ FILÉ*\n${linhas('file')}\n\n*🥗 ENTRADAS*\n${linhas('entradas')}\n\n*🍱 ALMOÇOS (1p)*\n${linhas('almoco1')}\n\n*🍱 ALMOÇOS (2p)*\n${linhas('almoco2')}\n\n*🍟 PETISCOS*\n${linhas('petiscos')}\n\n*🍕 PIZZA GRANDE*\n${linhas('pizzag')}\n\n*🍕 PIZZA MÉDIA*\n${linhas('pizzam')}`,
      [{l:'🛒 Quero fazer um pedido!',fn:()=>fluxoPedido()},{l:'🏠 Voltar',fn:()=>iniciar()}]);
  },[]);

  const verHorario = useCallback(async()=>{
    user('🕐 Horário de funcionamento');
    await delay(300);
    bot('*⏰ Horário de Funcionamento*\n\nTodos os dias: 10h30 às 21h00\n\nEstamos abertos todos os dias! 🎉',
      [{l:'🛒 Fazer pedido',fn:()=>fluxoPedido()},{l:'🏠 Voltar',fn:()=>iniciar()}]);
  },[]);

  const verEndereco = useCallback(async()=>{
    user('📍 Endereço / Localização');
    await delay(300);
    bot('*📍 Onde nos encontrar*\n\nCabo de Santo Agostinho — PE\n📞 (81) 99219-4757\n\n🛵 Delivery: Cohab, São Francisco, Vila Claudete, Garapu, Malaquias, Torrinha, Bela Vista, Charneca, Pirapama e região!',
      [{l:'🛒 Fazer pedido',fn:()=>fluxoPedido()},{l:'🏠 Voltar',fn:()=>iniciar()}]);
  },[]);

  /* ══ FLUXO DO PEDIDO ══ */
  const fluxoPedido = useCallback(async()=>{
    user('🛒 Fazer um pedido');
    await delay(300);
    bot('Ótimo! 😄 Vamos montar seu pedido!\n\nEscolha uma categoria:');
    await delay(200);
    escolherCategoria();
  },[]);

  /* ── Bairro ── */
  const escolherBairro = useCallback(async()=>{
    user('🛵 Delivery');
    const p = pedidoRef.current;
    p.entrega = 'Delivery';
    await delay(300);
    bot('Qual é o seu *bairro*?\n\nA taxa de entrega varia conforme a região:',
      BAIRROS.map(b=>({l:`📍 ${b.nome} — taxa ${fmt(b.taxa)}`,fn:async()=>{
        p.bairro = b;
        user(`📍 ${b.nome}`);
        await delay(300);
        bot(`*Taxa de entrega:* ${fmt(b.taxa)}\n*Tempo estimado:* ${b.tempo} ⏰\n\nAgora me informe o *endereço completo*\n(rua, número, complemento, ponto de referência)`);
        const end = await askInput('Rua, número, complemento…');
        p.endereco = end;
        user(end);
        await delay(300);
        escolherCategoria();
      }}))
    );
  },[askInput]);

  /* ── Categoria ── */
  const escolherCategoria = useCallback(async()=>{
    await delay(200);
    bot('O que você vai querer hoje? 😋',[
      {l:'🥩 Churrascos',      fn:()=>listarItens('churrasco','🥩 Churrascos')},
      {l:'🍗 Aves',            fn:()=>listarItens('aves','🍗 Aves')},
      {l:'🍽️ Filé',           fn:()=>listarItens('file','🍽️ Filé')},
      {l:'🥗 Entradas',        fn:()=>listarItens('entradas','🥗 Entradas')},
      {l:'🍱 Almoços (1p)',    fn:()=>listarItens('almoco1','🍱 Almoços (1 pessoa)')},
      {l:'🍱 Almoços (2p)',    fn:()=>listarItens('almoco2','🍱 Almoços (2 pessoas)')},
      {l:'🍟 Petiscos',        fn:()=>listarItens('petiscos','🍟 Petiscos')},
      {l:'🍕 Pizza Grande',    fn:()=>listarItens('pizzag','🍕 Pizza Grande')},
      {l:'🍕 Pizza Média',     fn:()=>listarItens('pizzam','🍕 Pizza Média')},
    ]);
  },[]);

  /* ── Listar itens ── */
  const listarItens = useCallback(async(cat,label)=>{
    user(label);
    await delay(300);
    const itens = CARDAPIO[cat];
    bot(`*${label}* — toque para adicionar:`,[
      ...itens.map(it=>({l:`${it.ic} ${it.nome} — ${fmt(it.preco)}`,fn:()=>adicionarItem(it)})),
      {l:'⬅️ Outras categorias',fn:()=>escolherCategoria()},
    ]);
  },[]);

  /* ── Adicionar item ── */
  const adicionarItem = useCallback(async(it)=>{
    const p = pedidoRef.current;
    p.carrinho = [...p.carrinho, it];
    user(`${it.ic} ${it.nome}`);
    await delay(300);
    const subtotal = p.carrinho.reduce((s,i)=>s+i.preco,0);
    const lista = p.carrinho.map(i=>`${i.ic} ${i.nome} — ${fmt(i.preco)}`).join('\n');
    bot(`Adicionado! ✅\n\n*Carrinho atual:*\n${lista}\n\n*Subtotal: ${fmt(subtotal)}*\n\nDeseja mais algum item?`,[
      {l:'🥩 Churrascos',      fn:()=>listarItens('churrasco','🥩 Churrascos')},
      {l:'🍗 Aves',            fn:()=>listarItens('aves','🍗 Aves')},
      {l:'🍽️ Filé',           fn:()=>listarItens('file','🍽️ Filé')},
      {l:'🥗 Entradas',        fn:()=>listarItens('entradas','🥗 Entradas')},
      {l:'🍱 Almoços (1p)',    fn:()=>listarItens('almoco1','🍱 Almoços (1 pessoa)')},
      {l:'🍱 Almoços (2p)',    fn:()=>listarItens('almoco2','🍱 Almoços (2 pessoas)')},
      {l:'🍟 Petiscos',        fn:()=>listarItens('petiscos','🍟 Petiscos')},
      {l:'🍕 Pizza Grande',    fn:()=>listarItens('pizzag','🍕 Pizza Grande')},
      {l:'🍕 Pizza Média',     fn:()=>listarItens('pizzam','🍕 Pizza Média')},
      {l:'✅ Finalizar pedido', fn:()=>pedirNome()},
    ]);
  },[]);

  /* ── Nome + Entrega ── */
  const pedirNome = useCallback(async()=>{
    user('✅ Finalizar pedido');
    await delay(300);
    bot('Ótimo! 😄\n\nQual é o seu *nome completo*?');
    const nome = await askInput('Seu nome completo…');
    const p = pedidoRef.current;
    p.nome = nome;
    user(nome);
    await delay(300);
    bot(`Perfeito, *${nome}*! 👍\n\nComo prefere receber seu pedido?`,[
      {l:'🛵 Delivery (entrega em casa)', fn:()=>escolherBairro()},
      {l:'🏃 Retirada no local',          fn:()=>{ p.entrega='Retirada'; user('🏃 Retirada no local'); escolherPagamento(); }},
    ]);
  },[askInput]);

  /* ── Pagamento ── */
  const escolherPagamento = useCallback(async()=>{
    user('✅ Finalizar pedido');
    await delay(300);
    bot('Qual vai ser a *forma de pagamento*? 💳',
      PGTOS.map(pg=>({l:`${pg.ic} ${pg.label}`,fn:async()=>{
        const p = pedidoRef.current;
        p.pgto = pg.label;
        user(`${pg.ic} ${pg.label}`);
        if(pg.key==='dinheiro'){
          await delay(300);
          bot('Vai precisar de *troco*?',[
            {l:'💵 Sim, preciso de troco', fn:async()=>{
              user('💵 Sim, preciso de troco');
              await delay(300);
              bot('Troco para quanto? (ex: 100,00)');
              const troco = await askInput('Troco para R$…');
              p.troco = troco;
              user(`Troco para R$ ${troco}`);
              await delay(300);
              mostrarResumo();
            }},
            {l:'Não preciso de troco',fn:()=>{ p.troco=''; user('Sem troco'); mostrarResumo(); }},
          ]);
        } else {
          await delay(300);
          mostrarResumo();
        }
      }}))
    );
  },[askInput]);

  /* ── Resumo ── */
  const mostrarResumo = useCallback(async()=>{
    const p = pedidoRef.current;
    const subtotal = p.carrinho.reduce((s,i)=>s+i.preco,0);
    const taxa = p.bairro?.taxa??0;
    const total = subtotal+taxa;
    const lista = p.carrinho.map(i=>`• ${i.ic} ${i.nome} — ${fmt(i.preco)}`).join('\n');
    const entInfo = p.entrega==='Delivery'
      ? `🛵 Delivery — ${p.bairro?.nome}\n📌 ${p.endereco}\n💰 Taxa: ${fmt(taxa)}`
      : '🏃 Retirada no local';
    const trocoInfo = p.troco?`\n🔄 Troco para R$ ${p.troco}`:'';

    bot(
      `*📋 RESUMO DO PEDIDO*\n\n*Cliente:* ${p.nome}\n\n*Itens:*\n${lista}\n\n*Subtotal:* ${fmt(subtotal)}\n${entInfo}\n\n*💳 Pagamento:* ${p.pgto}${trocoInfo}\n\n*🏷 TOTAL: ${fmt(total)}*\n\n*Confirma o pedido?*`,[
      {l:'✅ SIM, confirmar pedido!',fn:()=>confirmar(total,taxa)},
      {l:'❌ Cancelar',             fn:()=>iniciar()},
    ]);
  },[]);

  /* ── Confirmar ── */
  const confirmar = useCallback(async(total,taxa)=>{
    user('✅ SIM, confirmar pedido!');
    const p = pedidoRef.current;
    const subtotal = p.carrinho.reduce((s,i)=>s+i.preco,0);

    const novoPedido = {
      id: Date.now(),
      cliente: p.nome,
      itens: p.carrinho.map(i=>i.nome),
      total,
      status:'aguardando',
      hora: hora(),
      tipo: p.carrinho.some(i=>i.id.startsWith('p'))?'pizza':'churrasco',
      entrega: p.entrega,
      bairro: p.bairro?.nome||'',
      pgto: p.pgto,
    };
    onNovoPedido(novoPedido);

    /* Link WhatsApp com resumo do pedido */
    const lista = p.carrinho.map(i=>`• ${i.ic} ${i.nome} — ${fmt(i.preco)}`).join('\n');
    const waTexto = [
      `*✅ PEDIDO CONFIRMADO — Delícias na Brasa*`,
      ``,`*Cliente:* ${p.nome}`,
      ``,`*Itens:*`,lista,
      ``,`*Total: ${fmt(total)}*`,
      p.entrega==='Delivery'?`*Entrega:* ${p.bairro?.nome} — taxa ${fmt(taxa)}\n*Endereço:* ${p.endereco}`:`*Retirada no local*`,
      `*Pagamento:* ${p.pgto}`,p.troco?`*Troco:* R$ ${p.troco}`:'',
      ``,`*⏰ ${p.bairro?.tempo||'30–45 min'}*`,
      ``,`Obrigado pela preferência! 🔥🍕🥩`,
    ].filter(l=>l!==undefined).join('\n');
    const waLink = `https://wa.me/${WA}?text=${encodeURIComponent(waTexto)}`;

    await delay(300);
    setMsgs(prev=>[...prev,{
      id:Date.now()+Math.random(), de:'bot',
      txt:`*Pedido registrado!* 🎉\n\nNúmero: *#${String(novoPedido.id).slice(-4)}*\n⏰ ${p.bairro?.tempo||'30–45 min'}\n\nClique abaixo para confirmar pelo WhatsApp e acompanhar seu pedido! 👇`,
      waLink,
    }]);
    setOpcoes([{l:'🛒 Fazer outro pedido',fn:()=>iniciar()},{l:'🏠 Menu inicial',fn:()=>iniciar()}]);
  },[onNovoPedido]);

  /* abrir/fechar */
  const abrirChat = ()=>{
    if(!open && msgs.length===0) iniciar();
    setOpen(o=>!o);
  };

  /* renderizar bold + quebras de linha */
  const renderTxt = (txt)=>txt.split('\n').map((ln,i)=>{
    const parts = ln.split(/(\*[^*]+\*)/g);
    return <p key={i} className={i>0?'mt-0.5':''}>{parts.map((pt,j)=>
      pt.startsWith('*')&&pt.endsWith('*')
        ?<strong key={j}>{pt.slice(1,-1)}</strong>
        :pt
    )}</p>;
  });

  return <>
    {/* Botão chat */}
    <button onClick={abrirChat}
      className="fixed bottom-24 right-6 w-14 h-14 bg-gradient-to-br from-orange-500 to-orange-600 rounded-full shadow-2xl flex items-center justify-center z-50 hover:scale-110 transition-all">
      {open?<Ic.X className="w-5 h-5 text-white"/>:<Ic.Chat className="w-6 h-6 text-white"/>}
      {!open&&<span className="absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full ring-2 ring-white pd"/>}
    </button>

    {/* Botão WhatsApp fixo */}
    <a href={`https://wa.me/${WA}`} target="_blank" rel="noreferrer"
      className="fixed bottom-6 right-6 w-14 h-14 bg-[#25D366] rounded-full shadow-2xl flex items-center justify-center z-50 hover:scale-110 transition-all hover:bg-[#1ead55]">
      <Ic.WA className="w-7 h-7 text-white"/>
    </a>

    {/* Janela do chat */}
    {open&&<div className="fixed bottom-40 right-6 w-[370px] bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden z-50 fi"
      style={{maxHeight:'calc(100vh - 190px)'}}>

      {/* Header estilo WhatsApp */}
      <div className="bg-[#075E54] px-4 py-3 text-white shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center shrink-0">
            <Ic.Grill className="w-5 h-5 text-white"/>
          </div>
          <div className="flex-1 min-w-0">
            <p className="font-bold text-sm">Delícias na Brasa</p>
            <div className="flex items-center gap-1.5 mt-0.5">
              <span className="w-1.5 h-1.5 bg-emerald-400 rounded-full pd"/>
              <p className="text-xs text-green-200">online agora</p>
            </div>
          </div>
          <a href={`https://wa.me/${WA}`} target="_blank" rel="noreferrer"
            className="bg-white/15 hover:bg-white/25 rounded-full p-2 transition" title="Abrir WhatsApp">
            <Ic.WA className="w-4 h-4 text-white"/>
          </a>
        </div>
      </div>

      {/* Mensagens */}
      <div className="flex-1 overflow-y-auto scr p-3 space-y-2 wa-bg" style={{minHeight:180}}>
        {msgs.map(m=><div key={m.id} className={`flex ${m.de==='user'?'justify-end':'justify-start'} fi`}>
          <div className="max-w-[85%] flex flex-col gap-2">
            <div className={`px-3 py-2 text-sm leading-relaxed shadow-sm ${m.de==='user'?'bg-[#DCF8C6] text-slate-800 bbr':'bg-white text-slate-800 bbl'}`}>
              {renderTxt(m.txt)}
              <p className={`text-[10px] mt-1 text-right ${m.de==='user'?'text-green-600':'text-slate-400'}`}>
                {hora()}{m.de==='user'?' ✓✓':''}
              </p>
            </div>
            {m.waLink&&<a href={m.waLink} target="_blank" rel="noreferrer"
              className="flex items-center gap-2 bg-[#25D366] hover:bg-[#1ead55] text-white text-xs font-bold px-4 py-2.5 rounded-xl transition shadow-sm">
              <Ic.WA className="w-4 h-4"/>Confirmar & acompanhar no WhatsApp
            </a>}
          </div>
        </div>)}
        <div ref={endRef}/>
      </div>

      {/* Botões de opção */}
      {opcoes.length>0&&<div className="shrink-0 bg-[#F0F0F0] border-t border-slate-200 p-2 flex flex-wrap gap-1.5">
        {opcoes.map((op,i)=><button key={i} onClick={op.fn}
          className="bg-white border border-slate-300 hover:bg-[#25D366] hover:text-white hover:border-[#25D366] text-slate-700 text-xs px-3 py-1.5 rounded-full transition font-medium shadow-sm">
          {op.l}
        </button>)}
      </div>}

      {/* Input de texto */}
      <div className={`shrink-0 flex items-center gap-2 px-2 py-2 bg-[#F0F0F0] ${opcoes.length>0?'':'border-t border-slate-200'}`}>
        <input value={inputVal} onChange={e=>setInputVal(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&inputMode&&submitInput()}
          placeholder={inputMode||'Selecione uma opção acima…'}
          disabled={!inputMode}
          className="flex-1 bg-white border border-slate-200 rounded-full px-4 py-2 text-sm outline-none focus:border-[#25D366] disabled:opacity-40 disabled:cursor-not-allowed"/>
        <button onClick={submitInput} disabled={!inputMode||!inputVal.trim()}
          className="w-9 h-9 bg-[#25D366] hover:bg-[#1ead55] disabled:bg-slate-300 text-white rounded-full flex items-center justify-center transition shrink-0">
          <Ic.Send className="w-4 h-4"/>
        </button>
      </div>
    </div>}
  </>;
}

/* ─── APP ─── */
function App(){
  const [pedidos,setPedidos]=useState(PEDIDOS_DEMO);
  const [pag,setPag]=useState('dashboard');
  const [wsStatus,setWsStatus]=useState('conectando'); // conectando | ok | erro

  /* WebSocket — sincroniza com o servidor em tempo real */
  useEffect(()=>{
    const proto = location.protocol==='https:'?'wss':'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = ()=>{ setWsStatus('ok'); };
    ws.onclose= ()=>{ setWsStatus('erro'); };
    ws.onerror= ()=>{ setWsStatus('erro'); };

    ws.onmessage = e=>{
      const d = JSON.parse(e.data);
      if(d.tipo==='pedidos_atuais') setPedidos(d.pedidos);
      if(d.tipo==='novo_pedido')    setPedidos(p=>[d.pedido,...p]);
      if(d.tipo==='status_atualizado')
        setPedidos(p=>p.map(x=>x.id===d.id?{...x,status:d.status}:x));
    };

    return ()=>ws.close();
  },[]);

  /* Atualiza status via API (notifica cliente no WhatsApp automaticamente) */
  const atualizarStatus = async (id, status)=>{
    setPedidos(p=>p.map(x=>x.id===id?{...x,status}:x)); // otimista
    try{ await fetch(`/api/pedido/${id}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})}); }
    catch(e){ console.error(e); }
  };

  return <div className="min-h-screen bg-slate-100 flex flex-col">
    <header className="bg-gradient-to-r from-orange-600 via-orange-500 to-red-600 text-white shadow-lg shrink-0">
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
        <div className="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center shrink-0">
          <Ic.Flame className="w-5 h-5 text-white"/>
        </div>
        <div className="min-w-0">
          <h1 className="text-base font-bold leading-tight">🔥 Delícias na Brasa</h1>
          <div className="flex items-center gap-1.5">
            <span className={`w-1.5 h-1.5 rounded-full ${wsStatus==='ok'?'bg-emerald-400 pd':wsStatus==='erro'?'bg-red-400':'bg-yellow-400 pd'}`}/>
            <p className="text-xs text-orange-200">
              {wsStatus==='ok'?'Bot conectado':wsStatus==='erro'?'Bot desconectado':'Conectando…'}
            </p>
          </div>
        </div>
        <nav className="ml-auto flex gap-1">
          {[{id:'dashboard',l:'Dashboard',IC:Ic.Grid},{id:'cardapio',l:'Cardápio',IC:Ic.List}].map(n=>
            <button key={n.id} onClick={()=>setPag(n.id)}
              className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium transition ${pag===n.id?'bg-white text-orange-600 shadow-sm':'text-white/80 hover:bg-white/15'}`}>
              <n.IC className="w-4 h-4"/>
              <span className="hidden sm:inline">{n.l}</span>
            </button>)}
        </nav>
      </div>
    </header>
    <main className="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
      {pag==='dashboard'&&<Dashboard pedidos={pedidos} onStatus={atualizarStatus}/>}
      {pag==='cardapio'&&<Cardapio/>}
    </main>
    <ChatBot onNovoPedido={p=>setPedidos(prev=>[p,...prev])}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
